name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format clang-tidy cmake

      - name: Run quality gate
        run: python3 scripts/quality.py check
